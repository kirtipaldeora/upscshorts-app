name: Daily loading briefs

on:
  schedule:
    # GitHub cron uses UTC. 01:00 UTC is 06:30 IST.
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: Optional IST date to build (YYYY-MM-DD)
        required: false
        type: string
      count:
        description: Number of rotating case studies
        required: true
        default: '4'
        type: choice
        options:
          - '3'
          - '4'
          - '5'

permissions:
  contents: write

concurrency:
  group: daily-loading-briefs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate validated case studies
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIEF_DATE: ${{ inputs.date }}
          BRIEF_COUNT: ${{ inputs.count || '4' }}
        run: |
          args=(--engine api --count "$BRIEF_COUNT")
          if [[ -n "$BRIEF_DATE" ]]; then args+=(--date "$BRIEF_DATE"); fi
          node scripts/news-pipeline/loading-briefs.mjs "${args[@]}"

      - name: Verify generated snapshot
        run: |
          node scripts/news-pipeline/loading-briefs.mjs --validate app/public/data/loading-briefs/latest.json
          git diff --check -- app/public/data/loading-briefs/latest.json

      - name: Detect a real content change
        id: changes
        run: |
          if git diff --quiet -- app/public/data/loading-briefs/latest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated loading briefs
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Penni content bot"
          git config user.email "content-bot@users.noreply.github.com"
          git add -- app/public/data/loading-briefs/latest.json
          git commit -m "content: refresh daily loading briefs"
          git push origin HEAD:main

