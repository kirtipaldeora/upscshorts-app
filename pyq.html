<!DOCTYPE html>
<html class="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PYQ Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root{--bg1:#8E93D9;--bg2:#7A7FC9;--bg3:#6C71BC;--panel:rgba(255,255,255,.2);--panel2:rgba(255,255,255,.13);--panel-border:rgba(255,255,255,.35);--card:#FFFFFF;--ink:#41447E;--ink2:#8285B5;--ink3:#ABADD1;--on:#FFF;--on2:rgba(255,255,255,.75);--on3:rgba(255,255,255,.5);--yellow:#F6D66B;--yellow-ink:#6B5A1E;--acc:#6C71C4;--good:#4CAF82;--bad:#E36D6D;--border:rgba(65,68,126,.1);--card2:rgba(65,68,126,.06);--shadow:0 20px 44px rgba(46,48,96,.3);--shadow-soft:0 10px 26px rgba(46,48,96,.2)}
html.dark{--bg1:#262850;--bg2:#1E2042;--bg3:#181A38;--panel:rgba(255,255,255,.09);--panel2:rgba(255,255,255,.06);--panel-border:rgba(255,255,255,.16);--card:#2E3160;--ink:#EDEFFF;--ink2:#A9ACD6;--ink3:#7B7EB0;--on:#FFF;--on2:rgba(255,255,255,.72);--on3:rgba(255,255,255,.45);--yellow:#F6D66B;--yellow-ink:#6B5A1E;--acc:#9DA2F2;--good:#5BBE8D;--bad:#E77676;--border:rgba(255,255,255,.1);--card2:rgba(255,255,255,.07);--shadow:0 20px 48px rgba(0,0,0,.5);--shadow-soft:0 10px 28px rgba(0,0,0,.35)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg3));color:var(--on);height:100dvh;overflow:hidden;display:flex;flex-direction:column;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(500px 360px at 50% -8%,rgba(255,255,255,.12),transparent 60%);pointer-events:none;z-index:0}
button{font-family:'Nunito',sans-serif;cursor:pointer}
button:active{transform:scale(.94)}
::-webkit-scrollbar{width:0}
.pv-header{display:flex;align-items:center;gap:12px;padding:14px 18px 0;flex-shrink:0;position:relative;z-index:2}
.pv-header button{width:42px;height:42px;border-radius:15px;border:1px solid var(--panel-border);background:var(--panel);backdrop-filter:blur(16px);color:var(--on);font-size:14px;display:flex;align-items:center;justify-content:center}
.pv-hero{padding:2px 20px 12px;position:relative;z-index:2;text-align:center;margin-top:-42px;pointer-events:none}
.pv-hero p{font-size:12px;color:var(--on2);font-weight:700;margin-bottom:2px}
.pv-hero h2{font-size:26px;font-weight:900;line-height:1.08;color:var(--on)}
.pv-hero h2 span{color:var(--yellow)}
.pv-body{flex:1;overflow-y:auto;padding:10px 16px 60px;position:relative;z-index:2}
.pv-search{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--panel-border);backdrop-filter:blur(16px);border-radius:20px;padding:13px 17px;margin-bottom:12px}
.pv-search i{color:var(--on2);font-size:14px}
.pv-search input{flex:1;background:none;border:none;outline:none;color:var(--on);font-family:'Nunito';font-size:14.5px;font-weight:600}
.pv-search input::placeholder{color:var(--on3)}
.pv-tabs{display:flex;gap:8px;margin-bottom:12px}
.pv-tab{flex:1;text-align:center;padding:11px;border-radius:18px;border:1px solid var(--panel-border);background:var(--panel2);backdrop-filter:blur(12px);color:var(--on2);font-size:13px;font-weight:800;transition:all .25s}
.pv-tab.active{border-color:transparent;background:#fff;color:#4A4E8C;box-shadow:var(--shadow-soft)}
.pv-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:2px;scrollbar-width:none}
.pv-chips::-webkit-scrollbar{display:none}
.pv-chip{flex-shrink:0;padding:8px 15px;border-radius:18px;font-size:12px;font-weight:700;border:1px solid var(--panel-border);background:var(--panel2);color:var(--on2);white-space:nowrap;transition:all .2s}
.pv-chip.active{border-color:transparent;background:#fff;color:#4A4E8C}
.pv-count{font-size:11.5px;color:var(--on2);margin:4px 4px 12px;font-weight:800}
.pv-card{background:var(--card);border:none;border-radius:26px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow-soft);animation:cardIn .45s cubic-bezier(.22,1,.36,1) both;color:var(--ink)}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.pv-card-top{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pv-tag{font-size:9.5px;font-weight:900;letter-spacing:.4px;text-transform:uppercase;padding:5px 11px;border-radius:12px}
.pv-tag.year{background:rgba(108,113,196,.14);color:var(--acc)}
.pv-tag.paper{background:rgba(76,175,130,.15);color:var(--good)}
.pv-tag.subject{background:var(--card2);color:var(--ink2)}
.pv-bm{margin-left:auto;width:36px;height:36px;border-radius:13px;background:var(--card2);border:none;color:var(--ink2);font-size:14px;display:flex;align-items:center;justify-content:center}
.pv-bm.on{color:var(--yellow-ink);background:var(--yellow)}
.pv-q{font-size:15px;line-height:1.55;font-weight:800;margin-bottom:14px;color:var(--ink)}
.pv-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.pv-opt{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:16px;border:1.5px solid var(--border);background:var(--card2);font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--ink)}
.pv-opt .ol{width:24px;height:24px;border-radius:9px;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:900;color:var(--ink2);flex-shrink:0}
.pv-opt:hover{border-color:var(--ink3)}
.pv-opt:active{transform:scale(.98)}
.pv-opt.correct{border-color:var(--good);background:rgba(76,175,130,.12)}
.pv-opt.correct .ol{background:var(--good);border-color:var(--good);color:#fff}
.pv-opt.wrong{border-color:var(--bad);background:rgba(227,109,109,.1)}
.pv-opt.wrong .ol{background:var(--bad);border-color:var(--bad);color:#fff}
.pv-key{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.pv-key li{list-style:none;font-size:13px;color:var(--ink2);padding-left:18px;position:relative;line-height:1.55;font-weight:600}
.pv-key li::before{content:'';position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--yellow-deep,#EFC94C)}
.pv-reveal{background:var(--yellow);color:var(--yellow-ink);border:none;border-radius:16px;padding:11px 18px;font-size:12px;font-weight:900}
.pv-explain{display:none;margin-top:14px;padding-top:14px;border-top:1.5px dashed var(--border);font-size:13px;color:var(--ink2);line-height:1.65;font-weight:600}
.pv-explain.show{display:block}
.pv-explain b{color:var(--ink)}
.pv-empty{text-align:center;padding:60px 20px;color:var(--on2);font-weight:700}
.pv-empty i{font-size:32px;margin-bottom:12px;display:block;opacity:.5}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="pv-header">
  <button onclick="goBack()" aria-label="Back"><i class="fas fa-arrow-left"></i></button>
</div>
<div class="pv-hero"><p>Practice previous years 📝</p><h2>PYQ <span>Vault</span></h2></div>
<div class="pv-body">
  <div class="pv-search"><i class="fas fa-search"></i><input id="pv-search" placeholder="Search questions, subjects..." oninput="render()"></div>
  <div class="pv-tabs">
    <button class="pv-tab active" data-exam="all" onclick="setExam(this)">All</button>
    <button class="pv-tab" data-exam="prelims" onclick="setExam(this)">Prelims</button>
    <button class="pv-tab" data-exam="mains" onclick="setExam(this)">Mains</button>
  </div>
  <div class="pv-chips" id="pv-years"></div>
  <div class="pv-chips" id="pv-subjects"></div>
  <div class="pv-count" id="pv-count"></div>
  <div id="pv-list"></div>
</div>
<script>
let DATA=[],BM=JSON.parse(localStorage.getItem('u4pyqbm')||'[]'),F={exam:'all',year:'all',subject:'all',q:''};
try{document.documentElement.classList.toggle('dark',localStorage.getItem('u4th')==='dark')}catch(e){}
function hap(p){try{if(navigator.vibrate)navigator.vibrate(p||8)}catch(e){}}
document.addEventListener('click',e=>{if(e.target.closest('button,.pv-opt,.pv-chip'))hap(8)},{capture:true,passive:true});
function goBack(){try{window.parent.closePYQ()}catch(e){history.back()}}
function toggleBm(id){const i=BM.indexOf(id);if(i>-1)BM.splice(i,1);else BM.push(id);localStorage.setItem('u4pyqbm',JSON.stringify(BM));render()}
function setExam(btn){document.querySelectorAll('.pv-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');F.exam=btn.dataset.exam;buildChips();render()}
function buildChips(){
  const pool=F.exam==='all'?DATA:DATA.filter(d=>d.exam===F.exam);
  const years=[...new Set(pool.map(d=>d.year))].sort((a,b)=>b-a);
  const subs=[...new Set(pool.map(d=>d.subject))].sort();
  if(!years.includes(F.year))F.year='all';
  if(!subs.includes(F.subject))F.subject='all';
  document.getElementById('pv-years').innerHTML=['all',...years].map(y=>`<button class="pv-chip ${F.year===y?'active':''}" onclick="setYear(${JSON.stringify(y)})">${y==='all'?'All Years':y}</button>`).join('');
  document.getElementById('pv-subjects').innerHTML=['all',...subs].map(s=>`<button class="pv-chip ${F.subject===s?'active':''}" onclick="setSubject(${JSON.stringify(s)})">${s==='all'?'All Subjects':s}</button>`).join('');
}
function setYear(y){F.year=y;buildChips();render()}
function setSubject(s){F.subject=s;buildChips();render()}
function filtered(){
  return DATA.filter(d=>{
    if(F.exam!=='all'&&d.exam!==F.exam)return false;
    if(F.year!=='all'&&d.year!==F.year)return false;
    if(F.subject!=='all'&&d.subject!==F.subject)return false;
    if(F.q){const q=F.q.toLowerCase();if(!(d.question.toLowerCase().includes(q)||d.subject.toLowerCase().includes(q)))return false}
    return true
  }).sort((a,b)=>b.year-a.year)
}
function pick(id,idx){
  const el=document.getElementById('opts-'+id);if(!el||el.dataset.picked)return;el.dataset.picked='1';
  const item=DATA.find(d=>d.id===id);
  [...el.children].forEach((c,i)=>{if(i===item.answer)c.classList.add('correct');else if(i===idx)c.classList.add('wrong')});
  document.getElementById('exp-'+id).classList.add('show')
}
function reveal(id){document.getElementById('exp-'+id).classList.add('show')}
function render(){
  F.q=document.getElementById('pv-search').value;
  const list=filtered();
  document.getElementById('pv-count').textContent=`${list.length} question${list.length!==1?'s':''}`;
  if(!list.length){document.getElementById('pv-list').innerHTML='<div class="pv-empty"><i class="fas fa-inbox"></i>No PYQs match these filters yet.</div>';return}
  document.getElementById('pv-list').innerHTML=list.map((d,i)=>{
    const bm=BM.includes(d.id);
    const tagPaper=d.exam==='prelims'?'Prelims · '+d.paper:'Mains · '+d.paper;
    let body='';
    if(d.exam==='prelims'){
      body=`<div class="pv-opts" id="opts-${d.id}">${d.options.map((o,oi)=>`<div class="pv-opt" onclick="pick('${d.id}',${oi})"><div class="ol">${String.fromCharCode(65+oi)}</div><div>${o}</div></div>`).join('')}</div>`;
    }else{
      body=`<ul class="pv-key">${(d.keyPoints||[]).map(k=>`<li>${k}</li>`).join('')}</ul><button class="pv-reveal" onclick="reveal('${d.id}')">Show model-answer notes</button>`;
    }
    return `<div class="pv-card" style="animation-delay:${Math.min(i*40,360)}ms"><div class="pv-card-top"><span class="pv-tag year">${d.year}</span><span class="pv-tag paper">${tagPaper}</span><span class="pv-tag subject">${d.subject}</span><button class="pv-bm ${bm?'on':''}" onclick="toggleBm('${d.id}')"><i class="${bm?'fas':'far'} fa-bookmark"></i></button></div><div class="pv-q">${d.question}</div>${body}<div class="pv-explain" id="exp-${d.id}"><b>Explanation:</b> ${d.explanation}</div></div>`
  }).join('')
}
fetch('pyq-data.json').then(r=>r.json()).then(d=>{DATA=d;buildChips();render()}).catch(()=>{document.getElementById('pv-list').innerHTML='<div class="pv-empty"><i class="fas fa-triangle-exclamation"></i>Could not load PYQ data.</div>'});
</script>
</body>
</html>
