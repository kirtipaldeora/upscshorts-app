<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PYQ Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root{--accent:#D4A853;--teal:#4ECDC4;--bg:#0A0A0A;--bg2:#111;--card:#151515;--card2:#1C1C1C;--text:#F0EDE6;--text2:#A8A49C;--text3:#6B6860;--border:#252525;--nav:#080808}
html.light{--bg:#F5F3EE;--bg2:#EDEAE4;--card:#FFF;--card2:#F0EDE6;--text:#1A1814;--text2:#6B6560;--text3:#9E9890;--border:#DDD8D0;--nav:#F5F3EE}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
.pv-header{height:52px;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--nav)}
.pv-header button{width:36px;height:36px;border-radius:10px;border:none;background:transparent;color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pv-header button:hover{background:var(--card2);color:var(--text)}
.pv-header h2{font-size:16px;font-weight:700;flex:1}
.pv-header h2 span{color:var(--accent)}
.pv-body{flex:1;overflow-y:auto;padding:14px 16px 90px}
.pv-search{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:12px}
.pv-search i{color:var(--text3)}
.pv-search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px}
.pv-tabs{display:flex;gap:8px;margin-bottom:12px}
.pv-tab{flex:1;text-align:center;padding:9px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.pv-tab.active{border-color:var(--accent);background:rgba(212,168,83,.12);color:var(--accent)}
.pv-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none}
.pv-chips::-webkit-scrollbar{display:none}
.pv-chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text2);white-space:nowrap;font-family:'DM Sans',sans-serif}
.pv-chip.active{border-color:var(--teal);background:rgba(78,205,196,.12);color:var(--teal)}
.pv-count{font-size:12px;color:var(--text3);margin-bottom:12px}
.pv-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.pv-card-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.pv-tag{font-size:10.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:3px 9px;border-radius:6px}
.pv-tag.year{background:rgba(212,168,83,.15);color:var(--accent)}
.pv-tag.paper{background:rgba(78,205,196,.15);color:var(--teal)}
.pv-tag.subject{background:var(--card2);color:var(--text2)}
.pv-bm{margin-left:auto;background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer}
.pv-bm.on{color:var(--accent)}
.pv-q{font-size:14.5px;line-height:1.55;font-weight:500;margin-bottom:12px}
.pv-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.pv-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:13.5px;cursor:pointer;transition:all .15s}
.pv-opt .ol{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--text3);flex-shrink:0}
.pv-opt:hover{border-color:var(--text3)}
.pv-opt.correct{border-color:#4CAF7D;background:rgba(76,175,125,.1)}
.pv-opt.correct .ol{background:#4CAF7D;border-color:#4CAF7D;color:#04201E}
.pv-opt.wrong{border-color:#E05252;background:rgba(224,82,82,.1)}
.pv-opt.wrong .ol{background:#E05252;border-color:#E05252;color:#fff}
.pv-key{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.pv-key li{list-style:none;font-size:13px;color:var(--text2);padding-left:16px;position:relative;line-height:1.5}
.pv-key li::before{content:'';position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.pv-reveal{background:var(--card2);color:var(--text2);border:none;border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.pv-explain{display:none;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);font-size:13px;color:var(--text2);line-height:1.6}
.pv-explain.show{display:block}
.pv-explain b{color:var(--text)}
.pv-empty{text-align:center;padding:60px 20px;color:var(--text3)}
.pv-empty i{font-size:32px;margin-bottom:12px;display:block}
</style>
</head>
<body>
<div class="pv-header">
  <button onclick="goBack()" aria-label="Back"><i class="fas fa-arrow-left"></i></button>
  <h2>PYQ <span>Vault</span></h2>
</div>
<div class="pv-body">
  <div class="pv-search"><i class="fas fa-search"></i><input id="pv-search" placeholder="Search questions, subjects..." oninput="render()"></div>
  <div class="pv-tabs">
    <button class="pv-tab active" data-exam="all" onclick="setExam(this)">All</button>
    <button class="pv-tab" data-exam="prelims" onclick="setExam(this)">Prelims</button>
    <button class="pv-tab" data-exam="mains" onclick="setExam(this)">Mains</button>
  </div>
  <div class="pv-chips" id="pv-years"></div>
  <div class="pv-chips" id="pv-subjects"></div>
  <div class="pv-count" id="pv-count"></div>
  <div id="pv-list"></div>
</div>
<script>
let DATA=[],BM=JSON.parse(localStorage.getItem('u4pyqbm')||'[]'),F={exam:'all',year:'all',subject:'all',q:''};
try{document.documentElement.classList.toggle('light',localStorage.getItem('u4th')==='light')}catch(e){}
function goBack(){try{window.parent.closePYQ()}catch(e){history.back()}}
function toast(){}
function toggleBm(id){const i=BM.indexOf(id);if(i>-1)BM.splice(i,1);else BM.push(id);localStorage.setItem('u4pyqbm',JSON.stringify(BM));render()}
function setExam(btn){document.querySelectorAll('.pv-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');F.exam=btn.dataset.exam;buildChips();render()}
function buildChips(){
  const pool=F.exam==='all'?DATA:DATA.filter(d=>d.exam===F.exam);
  const years=[...new Set(pool.map(d=>d.year))].sort((a,b)=>b-a);
  const subs=[...new Set(pool.map(d=>d.subject))].sort();
  if(!years.includes(F.year))F.year='all';
  if(!subs.includes(F.subject))F.subject='all';
  document.getElementById('pv-years').innerHTML=['all',...years].map(y=>`<button class="pv-chip ${F.year===y?'active':''}" onclick="setYear(${JSON.stringify(y)})">${y==='all'?'All Years':y}</button>`).join('');
  document.getElementById('pv-subjects').innerHTML=['all',...subs].map(s=>`<button class="pv-chip ${F.subject===s?'active':''}" onclick="setSubject(${JSON.stringify(s)})">${s==='all'?'All Subjects':s}</button>`).join('');
}
function setYear(y){F.year=y;buildChips();render()}
function setSubject(s){F.subject=s;buildChips();render()}
function filtered(){
  return DATA.filter(d=>{
    if(F.exam!=='all'&&d.exam!==F.exam)return false;
    if(F.year!=='all'&&d.year!==F.year)return false;
    if(F.subject!=='all'&&d.subject!==F.subject)return false;
    if(F.q){const q=F.q.toLowerCase();if(!(d.question.toLowerCase().includes(q)||d.subject.toLowerCase().includes(q)))return false}
    return true
  }).sort((a,b)=>b.year-a.year)
}
function pick(id,idx){
  const el=document.getElementById('opts-'+id);if(!el||el.dataset.picked)return;el.dataset.picked='1';
  const item=DATA.find(d=>d.id===id);
  [...el.children].forEach((c,i)=>{if(i===item.answer)c.classList.add('correct');else if(i===idx)c.classList.add('wrong')});
  document.getElementById('exp-'+id).classList.add('show')
}
function reveal(id){document.getElementById('exp-'+id).classList.add('show')}
function render(){
  F.q=document.getElementById('pv-search').value;
  const list=filtered();
  document.getElementById('pv-count').textContent=`${list.length} question${list.length!==1?'s':''}`;
  if(!list.length){document.getElementById('pv-list').innerHTML='<div class="pv-empty"><i class="fas fa-inbox"></i>No PYQs match these filters yet.</div>';return}
  document.getElementById('pv-list').innerHTML=list.map(d=>{
    const bm=BM.includes(d.id);
    const tagPaper=d.exam==='prelims'?'Prelims · '+d.paper:'Mains · '+d.paper;
    let body='';
    if(d.exam==='prelims'){
      body=`<div class="pv-opts" id="opts-${d.id}">${d.options.map((o,i)=>`<div class="pv-opt" onclick="pick('${d.id}',${i})"><div class="ol">${String.fromCharCode(65+i)}</div><div>${o}</div></div>`).join('')}</div>`;
    }else{
      body=`<ul class="pv-key">${(d.keyPoints||[]).map(k=>`<li>${k}</li>`).join('')}</ul><button class="pv-reveal" onclick="reveal('${d.id}')">Show model-answer notes</button>`;
    }
    return `<div class="pv-card"><div class="pv-card-top"><span class="pv-tag year">${d.year}</span><span class="pv-tag paper">${tagPaper}</span><span class="pv-tag subject">${d.subject}</span><button class="pv-bm ${bm?'on':''}" onclick="toggleBm('${d.id}')"><i class="${bm?'fas':'far'} fa-bookmark"></i></button></div><div class="pv-q">${d.question}</div>${body}<div class="pv-explain" id="exp-${d.id}"><b>Explanation:</b> ${d.explanation}</div></div>`
  }).join('')
}
fetch('pyq-data.json').then(r=>r.json()).then(d=>{DATA=d;buildChips();render()}).catch(()=>{document.getElementById('pv-list').innerHTML='<div class="pv-empty"><i class="fas fa-triangle-exclamation"></i>Could not load PYQ data.</div>'});
</script>
</body>
</html>
