<!DOCTYPE html>
<html class="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PYQ Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root{--bg:#EAE7E1;--glass:rgba(255,255,255,.55);--glass-strong:rgba(255,255,255,.8);--glass-border:rgba(255,255,255,.7);--card2:rgba(255,255,255,.42);--text:#161519;--text2:#5E5B65;--text3:#9A96A1;--border:rgba(22,21,25,.09);--ink:#161519;--ink-fg:#FFF;--acc:#4C7DFF;--lilac:#D8CCEF;--mint:#CDE7D7;--blush:#F1CDD7;--shadow:0 16px 40px rgba(65,58,80,.13);--shadow-soft:0 8px 24px rgba(65,58,80,.09);--good:#3E9B6E;--bad:#D95A5A}
html.dark{--bg:#090D15;--glass:rgba(22,29,45,.58);--glass-strong:rgba(26,34,53,.85);--glass-border:rgba(255,255,255,.09);--card2:rgba(255,255,255,.05);--text:#EAEEF6;--text2:#98A2B8;--text3:#5C6478;--border:rgba(255,255,255,.09);--ink:#4C7DFF;--ink-fg:#FFF;--acc:#6E96FF;--lilac:#3B3854;--mint:#2F4639;--blush:#4C3441;--shadow:0 18px 44px rgba(0,0,0,.5);--shadow-soft:0 8px 24px rgba(0,0,0,.35);--good:#5BBE8D;--bad:#E77676}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(460px 380px at 88% -6%,rgba(216,204,239,.55),transparent 65%),radial-gradient(420px 360px at -8% 50%,rgba(205,231,215,.5),transparent 65%);pointer-events:none;z-index:0}
html.dark body::before{background:radial-gradient(720px 500px at 50% 114%,rgba(58,105,255,.3),transparent 68%)}
button{font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer}
button:active{transform:scale(.95)}
::-webkit-scrollbar{width:0}
.pv-header{display:flex;align-items:center;gap:12px;padding:14px 20px 4px;flex-shrink:0;position:relative;z-index:2}
.pv-header button{width:40px;height:40px;border-radius:50%;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(14px);color:var(--text);font-size:14px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-soft)}
.pv-hero{padding:8px 20px 12px;position:relative;z-index:2}
.pv-hero p{font-size:12.5px;color:var(--text3);font-weight:600;margin-bottom:2px}
.pv-hero h2{font-size:32px;font-weight:800;letter-spacing:-1.4px;line-height:1.05}
.pv-hero h2 span{color:var(--acc)}
.pv-body{flex:1;overflow-y:auto;padding:4px 16px 60px;position:relative;z-index:2}
.pv-search{display:flex;align-items:center;gap:10px;background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:26px;padding:13px 18px;margin-bottom:12px;box-shadow:var(--shadow-soft)}
.pv-search i{color:var(--text3);font-size:14px}
.pv-search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Plus Jakarta Sans';font-size:14.5px}
.pv-search input::placeholder{color:var(--text3)}
.pv-tabs{display:flex;gap:8px;margin-bottom:12px}
.pv-tab{flex:1;text-align:center;padding:11px;border-radius:24px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:13px;font-weight:700;transition:all .25s}
.pv-tab.active{border-color:transparent;background:var(--ink);color:var(--ink-fg);box-shadow:var(--shadow-soft)}
.pv-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:2px;scrollbar-width:none}
.pv-chips::-webkit-scrollbar{display:none}
.pv-chip{flex-shrink:0;padding:8px 15px;border-radius:22px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--card2);color:var(--text2);white-space:nowrap;transition:all .2s}
.pv-chip.active{border-color:transparent;background:var(--ink);color:var(--ink-fg)}
.pv-count{font-size:11.5px;color:var(--text3);margin:4px 4px 12px;font-weight:600}
.pv-card{background:var(--glass);backdrop-filter:blur(22px) saturate(150%);border:1px solid var(--glass-border);border-radius:26px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow);animation:cardIn .45s cubic-bezier(.22,1,.36,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.pv-card-top{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pv-tag{font-size:9.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:5px 11px;border-radius:14px}
.pv-tag.year{background:rgba(76,125,255,.12);color:var(--acc)}
.pv-tag.paper{background:var(--mint);color:#2E5B4A}
html.dark .pv-tag.paper{color:#9FE0C8}
.pv-tag.subject{background:var(--card2);border:1px solid var(--border);color:var(--text2)}
.pv-bm{margin-left:auto;width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center}
.pv-bm.on{color:#fff;background:var(--acc);border-color:transparent}
.pv-q{font-size:15.5px;line-height:1.55;font-weight:700;letter-spacing:-.2px;margin-bottom:14px}
.pv-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.pv-opt{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:18px;border:1px solid var(--border);background:var(--card2);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s}
.pv-opt .ol{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;color:var(--text3);flex-shrink:0}
.pv-opt:hover{border-color:var(--text3)}
.pv-opt:active{transform:scale(.98)}
.pv-opt.correct{border-color:var(--good);background:rgba(62,155,110,.12)}
.pv-opt.correct .ol{background:var(--good);border-color:var(--good);color:#fff}
.pv-opt.wrong{border-color:var(--bad);background:rgba(217,90,90,.1)}
.pv-opt.wrong .ol{background:var(--bad);border-color:var(--bad);color:#fff}
.pv-key{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.pv-key li{list-style:none;font-size:13px;color:var(--text2);padding-left:18px;position:relative;line-height:1.55}
.pv-key li::before{content:'';position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--acc)}
.pv-reveal{background:var(--ink);color:var(--ink-fg);border:none;border-radius:22px;padding:11px 18px;font-size:12px;font-weight:700}
.pv-explain{display:none;margin-top:14px;padding-top:14px;border-top:1px dashed var(--border);font-size:13px;color:var(--text2);line-height:1.65}
.pv-explain.show{display:block}
.pv-explain b{color:var(--text)}
.pv-empty{text-align:center;padding:60px 20px;color:var(--text3);font-weight:500}
.pv-empty i{font-size:32px;margin-bottom:12px;display:block;opacity:.4}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="pv-header">
  <button onclick="goBack()" aria-label="Back"><i class="fas fa-arrow-left"></i></button>
</div>
<div class="pv-hero"><p>Practice previous years 📝</p><h2>PYQ <span>Vault</span></h2></div>
<div class="pv-body">
  <div class="pv-search"><i class="fas fa-search"></i><input id="pv-search" placeholder="Search questions, subjects..." oninput="render()"></div>
  <div class="pv-tabs">
    <button class="pv-tab active" data-exam="all" onclick="setExam(this)">All</button>
    <button class="pv-tab" data-exam="prelims" onclick="setExam(this)">Prelims</button>
    <button class="pv-tab" data-exam="mains" onclick="setExam(this)">Mains</button>
  </div>
  <div class="pv-chips" id="pv-years"></div>
  <div class="pv-chips" id="pv-subjects"></div>
  <div class="pv-count" id="pv-count"></div>
  <div id="pv-list"></div>
</div>
<script>
let DATA=[],BM=JSON.parse(localStorage.getItem('u4pyqbm')||'[]'),F={exam:'all',year:'all',subject:'all',q:''};
try{document.documentElement.classList.toggle('dark',localStorage.getItem('u4th')==='dark')}catch(e){}
function hap(p){try{if(navigator.vibrate)navigator.vibrate(p||8)}catch(e){}}
document.addEventListener('click',e=>{if(e.target.closest('button,.pv-opt,.pv-chip'))hap(8)},{capture:true,passive:true});
function goBack(){try{window.parent.closePYQ()}catch(e){history.back()}}
function toggleBm(id){const i=BM.indexOf(id);if(i>-1)BM.splice(i,1);else BM.push(id);localStorage.setItem('u4pyqbm',JSON.stringify(BM));render()}
function setExam(btn){document.querySelectorAll('.pv-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');F.exam=btn.dataset.exam;buildChips();render()}
function buildChips(){
  const pool=F.exam==='all'?DATA:DATA.filter(d=>d.exam===F.exam);
  const years=[...new Set(pool.map(d=>d.year))].sort((a,b)=>b-a);
  const subs=[...new Set(pool.map(d=>d.subject))].sort();
  if(!years.includes(F.year))F.year='all';
  if(!subs.includes(F.subject))F.subject='all';
  document.getElementById('pv-years').innerHTML=['all',...years].map(y=>`<button class="pv-chip ${F.year===y?'active':''}" onclick="setYear(${JSON.stringify(y)})">${y==='all'?'All Years':y}</button>`).join('');
  document.getElementById('pv-subjects').innerHTML=['all',...subs].map(s=>`<button class="pv-chip ${F.subject===s?'active':''}" onclick="setSubject(${JSON.stringify(s)})">${s==='all'?'All Subjects':s}</button>`).join('');
}
function setYear(y){F.year=y;buildChips();render()}
function setSubject(s){F.subject=s;buildChips();render()}
function filtered(){
  return DATA.filter(d=>{
    if(F.exam!=='all'&&d.exam!==F.exam)return false;
    if(F.year!=='all'&&d.year!==F.year)return false;
    if(F.subject!=='all'&&d.subject!==F.subject)return false;
    if(F.q){const q=F.q.toLowerCase();if(!(d.question.toLowerCase().includes(q)||d.subject.toLowerCase().includes(q)))return false}
    return true
  }).sort((a,b)=>b.year-a.year)
}
function pick(id,idx){
  const el=document.getElementById('opts-'+id);if(!el||el.dataset.picked)return;el.dataset.picked='1';
  const item=DATA.find(d=>d.id===id);
  [...el.children].forEach((c,i)=>{if(i===item.answer)c.classList.add('correct');else if(i===idx)c.classList.add('wrong')});
  document.getElementById('exp-'+id).classList.add('show')
}
function reveal(id){document.getElementById('exp-'+id).classList.add('show')}
function render(){
  F.q=document.getElementById('pv-search').value;
  const list=filtered();
  document.getElementById('pv-count').textContent=`${list.length} question${list.length!==1?'s':''}`;
  if(!list.length){document.getElementById('pv-list').innerHTML='<div class="pv-empty"><i class="fas fa-inbox"></i>No PYQs match these filters yet.</div>';return}
  document.getElementById('pv-list').innerHTML=list.map((d,i)=>{
    const bm=BM.includes(d.id);
    const tagPaper=d.exam==='prelims'?'Prelims · '+d.paper:'Mains · '+d.paper;
    let body='';
    if(d.exam==='prelims'){
      body=`<div class="pv-opts" id="opts-${d.id}">${d.options.map((o,oi)=>`<div class="pv-opt" onclick="pick('${d.id}',${oi})"><div class="ol">${String.fromCharCode(65+oi)}</div><div>${o}</div></div>`).join('')}</div>`;
    }else{
      body=`<ul class="pv-key">${(d.keyPoints||[]).map(k=>`<li>${k}</li>`).join('')}</ul><button class="pv-reveal" onclick="reveal('${d.id}')">Show model-answer notes</button>`;
    }
    return `<div class="pv-card" style="animation-delay:${Math.min(i*40,360)}ms"><div class="pv-card-top"><span class="pv-tag year">${d.year}</span><span class="pv-tag paper">${tagPaper}</span><span class="pv-tag subject">${d.subject}</span><button class="pv-bm ${bm?'on':''}" onclick="toggleBm('${d.id}')"><i class="${bm?'fas':'far'} fa-bookmark"></i></button></div><div class="pv-q">${d.question}</div>${body}<div class="pv-explain" id="exp-${d.id}"><b>Explanation:</b> ${d.explanation}</div></div>`
  }).join('')
}
fetch('pyq-data.json').then(r=>r.json()).then(d=>{DATA=d;buildChips();render()}).catch(()=>{document.getElementById('pv-list').innerHTML='<div class="pv-empty"><i class="fas fa-triangle-exclamation"></i>Could not load PYQ data.</div>'});
</script>
</body>
</html>
